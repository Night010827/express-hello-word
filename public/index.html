<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App (リアクション制限機能付き)</title>
  <style>
    .chat {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .messages li {
      padding: 10px 15px;      border-bottom: 1px solid #eee;      display: flex;      flex-direction: column;    }
    .username {      font-weight: bold;      font-size: 0.85rem;      color: #555;      margin-bottom: 3px;    }
    .time {      font-size: 0.75rem;      color: #888;      align-self: flex-end;      margin-top: 2px;    }
    .config-area {      display: flex;      gap: 10px;      padding: 10px;      background: #f9f9f9;      border-bottom: 1px solid #ddd;      align-items: center;    }
    .name-input {      padding: 5px 10px;      border: 1px solid #ccc;      border-radius: 4px;      width: 150px;    }
    .form {      display: flex;    }
    .input {      flex: 1;      padding: 10px;      border: 1px solid #ccc;    }
    .submit {      padding: 10px;      border: 1px solid #ccc;      background: #eee;      cursor: pointer;    }
    .reaction-area {      display: flex;      gap: 5px;      margin-top: 5px;    }
    .reaction-btn {      padding: 2px 6px;      font-size: 0.8rem;      border: 1px solid #ddd;      border-radius: 10px;      background: #fff;      cursor: pointer;      display: flex;      align-items: center;      gap: 3px;      transition: background 0.2s;    }
    .reaction-btn:hover {      background: #f0f0f0;    }
    .reaction-btn.my-active {      background: #e0f0ff;      border-color: #a0c0ff;    }  </style></head>
<body>
  <div class="chat">
    <div class="config-area">
      <label for="nickname">ニックネーム：</label>
      <input id="nickname" class="name-input" value="名無しさん" placeholder="名前を入力..." autocomplete="off" />
    </div>
    <ul class="messages"></ul>
    <form class="form">
      <input class="input" autocomplete="off" placeholder="メッセージを入力..." />
      <button class="submit">Send</button>
    </form>
  </div>
  <script>
    function main() {
      // ➔ 修正：Render環境（https）でも絶対に迷子にならないよう wss に対応させる
      const host = location.origin.replace(/^http/, 'ws').replace(/^https/, 'wss')
      const ws = new WebSocket(host + '/ws')
      
      // ➔ 修正：セキュリティエラーを絶対に起こさない安全なID生成
      const myId = Math.random().toString(36).substring(2, 10)

      const myReactions = {}
      const form = document.querySelector('.form')

      form.onsubmit = function (e) {
        e.preventDefault()

        const currentInput = document.querySelector('.input')
        const currentNameInput = document.querySelector('#nickname')
        const text = currentInput.value

        if (text.trim() !== '') {
          const now = new Date()
          const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0')
          const nickname = currentNameInput.value.trim() || '名無しさん'
          
          // ➔ 修正：ここも暗号化エラーを回避するため安全なID生成に変更
          const msgId = 'msg-' + Math.random().toString(36).substring(2, 15)

          ws.send(JSON.stringify({
            type: 'chat',
            msgId: msgId,
            id: myId,
            name: nickname,
            text: text,
            time: timeStr
          }))

          currentInput.value = ''
          currentInput.focus()
        }
      }

      window.sendReaction = function (msgId, emoji) {
        if (!myReactions[msgId]) {
          myReactions[msgId] = {}
        }

        const isAlreadyPressed = !!myReactions[msgId][emoji]

        if (isAlreadyPressed) {
          myReactions[msgId][emoji] = false
          ws.send(JSON.stringify({
            type: 'reaction',
            action: 'remove',
            msgId: msgId,
            emoji: emoji
          }))
        } else {
          myReactions[msgId][emoji] = true
          ws.send(JSON.stringify({
            type: 'reaction',
            action: 'add',
            msgId: msgId,
            emoji: emoji
          }))
        }
      }

      ws.onmessage = function (msg) {
        const data = JSON.parse(msg.data)

        if (data.type === 'chat') {
          const { msgId, id, name, text, time } = data
          const messageList = document.querySelector('.messages')
          const li = document.createElement('li')

          li.setAttribute('data-msg-id', msgId)
          const nameSpan = document.createElement('span')
          nameSpan.className = 'username'
          const textSpan = document.createElement('span')

          if (id === myId) {
            nameSpan.textContent = name + ' (自分)'
            li.style.background = "#e1ffc7"
          } else {
            nameSpan.textContent = name
          }
          textSpan.textContent = text

          const timeSpan = document.createElement('span')
          timeSpan.className = 'time'
          timeSpan.textContent = time || ''

          const reactionArea = document.createElement('div')
          reactionArea.className = 'reaction-area'

          const emojis = ['👍', '❤️', '😆']
          emojis.forEach(emoji => {
            const btn = document.createElement('button')
            btn.className = 'reaction-btn'
            btn.setAttribute('data-emoji', emoji)
            btn.innerHTML = `${emoji} <span class="count">0</span>`
            btn.onclick = () => sendReaction(msgId, emoji)
            reactionArea.appendChild(btn)
          })

          li.appendChild(nameSpan)
          li.appendChild(textSpan)
          li.appendChild(reactionArea)
          li.appendChild(timeSpan)

          messageList.appendChild(li)
          messageList.scrollTop = messageList.scrollHeight
        }
        else if (data.type === 'reaction') {
          const { msgId, emoji, action } = data

          const targetLi = document.querySelector(`li[data-msg-id="${msgId}"]`)
          if (targetLi) {
            const targetBtn = targetLi.querySelector(`button[data-emoji="${emoji}"]`)
            if (targetBtn) {
              const countSpan = targetBtn.querySelector('.count')
              let currentCount = parseInt(countSpan.textContent)

              if (action === 'add') {
                countSpan.textContent = currentCount + 1
              } else if (action === 'remove') {
                countSpan.textContent = Math.max(0, currentCount - 1)
              }

              if (myReactions[msgId] && myReactions[msgId][emoji]) {
                targetBtn.classList.add('my-active')
              } else {
                targetBtn.classList.remove('my-active')
              }
            }
          }
        }
      }

      ws.onerror = function (error) {
        console.error('WebSocket Error: ', error)
      }
    }

    main()
  </script>
</body>
</html>
