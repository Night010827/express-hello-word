<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <style>
    .chat { display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
    .messages { flex: 1; overflow-y: auto; list-style: none; padding: 10px; margin: 0; background: #f9f9f9; }
    .messages li { padding: 10px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; margin-bottom: 5px; border-radius: 4px; }
    .username { font-weight: bold; font-size: 0.85rem; color: #555; }
    .time { font-size: 0.75rem; color: #888; align-self: flex-end; }
    .config-area { padding: 10px; background: #eee; display: flex; gap: 10px; align-items: center; }
    .name-input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
    .input-area { display: flex; padding: 10px; background: #fff; border-top: 1px solid #ddd; gap: 10px; }
    .input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    .submit-btn { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .reaction-area { display: flex; gap: 5px; margin-top: 5px; }
    .reaction-btn { padding: 2px 6px; font-size: 0.8rem; border: 1px solid #ddd; border-radius: 10px; background: #fff; cursor: pointer; }
    .reaction-btn.my-active { background: #e0f0ff; border-color: #a0c0ff; }
  </style>
</head>
<body>
  <div class="chat">
    <div class="config-area">
      <label for="nickname">ニックネニックネーム：</label>
      <input id="nickname" class="name-input" value="名無しさん" autocomplete="off" />
    </div>
    <ul class="messages" id="message-list"></ul>
    <div class="input-area">
      <input type="text" id="msg-input" class="input" placeholder="メッセージを入力..." autocomplete="off" />
      <button id="send-btn" class="submit-btn">Send</button>
    </div>
  </div>

  <script>
    // テスト用に確実にローカルサーバーへ接続する設定
// 【修正】現在の画面のURL（location.origin）から、ws:// または wss:// のURLを自動生成する
    const host = location.origin.replace(/^http/, 'ws').replace(/^https/, 'wss');
    const ws = new WebSocket(host + '/ws');
    
    const myId = Math.random().toString(36).substring(2, 10);
    const myReactions = {};

    const sendBtn = document.getElementById('send-btn');
    const msgInput = document.getElementById('msg-input');
    const nicknameInput = document.getElementById('nickname');
    const messageList = document.getElementById('message-list');

    // 接続状態の確認ログ
    ws.onopen = function() {
      console.log("［接続成功］サーバーとWebSocketで繋がりました！");
    };
    ws.onerror = function(error) {
      console.error("［接続エラー］WebSocketで問題が発生しました:", error);
    };
    ws.onclose = function() {
      console.warn("［接続切断］サーバーとの接続が切れました。");
    };

    function sendMessage() {
      console.log("(1) Sendボタンが押されました");
      const text = msgInput.value;
      
      if (text.trim() === '') {
        console.warn("(警告) 入力欄が空っぽなので送信をスキップしました");
        return;
      }

      const now = new Date();
      const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      const nickname = nicknameInput.value.trim() || '名無しさん';
      const msgId = 'msg-' + Math.random().toString(36).substring(2, 15);

      const payload = {
        type: 'chat',
        msgId: msgId,
        id: myId,
        name: nickname,
        text: text,
        time: timeStr
      };

      console.log("(2) 以下のデータをサーバーへ送信します:", payload);
      
      // データを送信
      ws.send(JSON.stringify(payload));

      msgInput.value = '';
      msgInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    ws.onmessage = function (msg) {
      console.log("(3) サーバーからメッセージが戻ってきました！:", msg.data);
      try {
        const data = JSON.parse(msg.data);

        if (data.type === 'chat') {
          const { msgId, id, name, text, time } = data;
          const li = document.createElement('li');
          li.setAttribute('data-msg-id', msgId);

          if (id === myId) {
            li.style.background = "#e1ffc7";
          }

          li.innerHTML = `
            <span class="username">${name}${id === myId ? ' (自分)' : ''}</span>
            <span>${text}</span>
            <div class="reaction-area">
              <button class="reaction-btn" data-emoji="👍" onclick="sendReaction('${msgId}', '👍')">👍 <span class="count">0</span></button>
              <button class="reaction-btn" data-emoji="❤️" onclick="sendReaction('${msgId}', '❤️')">❤️ <span class="count">0</span></button>
              <button class="reaction-btn" data-emoji="😆" onclick="sendReaction('${msgId}', '😆')">😆 <span class="count">0</span></button>
            </div>
            <span class="time">${time || ''}</span>
          `;

          messageList.appendChild(li);
          messageList.scrollTop = messageList.scrollHeight;
          console.log("(4) 画面へのメッセージ追加が完了しました");
        }
      } catch (e) {
        console.error("データ解析エラー:", e);
      }
    };
  </script>
</body>
</html>
